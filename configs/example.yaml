# Example configuration for state_est_testbed
state_dimension: 2
num_time_steps: 50
dt: 0.1

initial:
  true_state: [0.0, 1.0]
  est_state: [0.0, 0.0]
  initial_cov: 1.0

dynamics:
  state_transition: [[1.0, 0.1], [0.0, 1.0]]
  process_noise_diag: [0.01, 0.01]
  control_matrix: [[0.0], [0.0]]

measurement:
  observation_matrix: [[1.0, 0.0]]
  measurement_noise: 0.1

estimator_type: ekf   # Options: kf, ekf, ukf, imm, mht
model_type: nonlinear # Options: linear, nonlinear

ukf:
  alpha: 0.001
  beta: 2.0
  kappa: 0.0

monte_carlo:
  runs: 10
  base_seed: 42
