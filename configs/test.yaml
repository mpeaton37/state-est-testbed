# Test configuration for state_est_testbed with nonlinear filter
state_dimension: 1
num_time_steps: 20
dt: 1.0

initial:
  true_state: [0.5]
  est_state: [0.0]
  initial_cov: 1.0

dynamics:
  # Nonlinear state transition: x_k+1 = sin(x_k) + u + w
  state_transition: [[1.0]]
  process_noise_diag: [0.05]
  control_matrix: [[1.0]]

measurement:
  # Nonlinear measurement: z_k = x_k^2 + v
  observation_matrix: [[1.0]]
  measurement_noise: 0.2

estimator_type: ekf   # Options: kf, ekf, ukf, imm, mht
model_type: nonlinear # Options: linear, nonlinear

ekf:
  # No extra parameters for EKF in this example

monte_carlo:
  runs: 5
  base_seed: 123
